<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hemut — Lead Enrichment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FFFAEB;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-wrap img { width: 27px; height: 29px; }
    .logo-wrap span {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #020202;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      border-top: 3px solid #FFD33B;
    }
    h1 { font-size: 1.35rem; margin-bottom: 6px; color: #020202; }
    .subtitle { color: #686868; font-size: 0.875rem; margin-bottom: 28px; line-height: 1.6; }
    label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; color: #333; }
    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus { border-color: #FFD33B; box-shadow: 0 0 0 3px rgba(255,211,59,0.15); }

    .file-drop {
      border: 2px dashed #e0e0e0;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-drop:hover { border-color: #FFD33B; background: #FFFAEB; }
    .file-drop .drop-label { font-size: 0.875rem; color: #686868; }
    .file-drop .drop-label span { color: #020202; font-weight: 600; }

    .file-filled {
      display: none;
      align-items: center;
      gap: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 20px;
      background: #fafafa;
    }
    .file-filled .check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background: #FFD33B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #020202;
      font-weight: 700;
    }
    .file-filled .file-name-text {
      flex: 1;
      font-size: 0.875rem;
      color: #020202;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-filled .remove-btn {
      flex-shrink: 0;
      width: auto;
      padding: 4px 8px;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #686868;
      cursor: pointer;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
    }
    .file-filled .remove-btn:hover { border-color: #dc2626; color: #dc2626; background: none; }

    input[type="file"] { display: none; }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #FFD33B;
      color: #020202;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #f0c520; }
    button[type="submit"]:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }

    #status {
      margin-top: 16px;
      font-size: 0.875rem;
      text-align: center;
      min-height: 20px;
      line-height: 1.5;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .processing { color: #686868; }

    .spam-note {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #918C8C;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABsAAAAdCAYAAABbjRdIAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAHpSURBVHgBrVZLUgIxEH0Ng2uOMO797vxWjTfQE+icQD2BeAL1BMoNvIFYhW6hoCyXcAQWrPhM7ISfQJLpVPE2E+jOvOmXTncTAqHaZwmUukYB/ERsd1Ip7X2/rf5NkJL8nBwgoydeJl5HwhvtfKU2UwQJUev8Eln2yssy/ERdDEuPbnMe0e9RjFGxkUtknO3yzZAf2bj4ISLS8u26iTQKPiOf04MzCZaJvPIt3FxEOuugPiACXdBuvZbnZY3MnBOpV8iIXiREGvYzGxfF8tFO/Q5CrEWmWic3THQDCYalCwRgiczIV6AH0c6MHumw1kUAlhJEtU91QiSCXSzf1zYCMT8zk+aZjMgnn2oksdVQRs9ENq0SHYiI1BUdfjfnL+8kZfQHt2xM4FNlVNqeRDapEnlMNQyj9P85qfbxLfrDCtvyaua93hdN5Ysdbj3OzHcQVVfv0mQfVSD4SL4ez3oVYbBV5WfV6ubINjGRkT1KFz8DYe4hkay6rHSBIDKTSPp8ZdVlrYkWEIKAMmbrAvKxIEQ+RxcQRRZcxhxdQCZjSBfYr1dc5lyyTXYB/1iw4S7gH3hGRZ0QMXLBVcIj3wzOyEzdk7WbJkZRCgGsqS+fFemFiSosXw8CuGYQ16zIL6UuPz+Z5Dm0U/8Bzq/PyQbuiSEAAAAASUVORK5CYII=" alt="Hemut logo" />
    <span>Hemut</span>
  </div>

  <div class="card">
    <h1>Lead Enrichment</h1>
    <p class="subtitle">Upload a CSV of companies. We'll enrich each one with industry data, sales angles, risk signals, and recent news, then email you the results.</p>

    <form id="form">
      <label for="email">Recipient Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label>CSV File</label>

      <div class="file-drop" id="file-drop" onclick="document.getElementById('csv').click()">
        <input type="file" id="csv" name="csv" accept=".csv" />
        <div class="drop-label"><span>Choose file</span> or drag and drop</div>
      </div>

      <div class="file-filled" id="file-filled">
        <div class="check">✓</div>
        <span class="file-name-text" id="file-name-text"></span>
        <button type="button" class="remove-btn" id="remove-btn">✕ Remove</button>
      </div>

      <button type="submit" id="btn">Enrich &amp; Send</button>
    </form>

    <div id="status"></div>
    <p class="spam-note" id="spam-note">
      Don't see the email? Check your spam folder.
    </p>
  </div>

  <script>
    const csvInput     = document.getElementById('csv');
    const fileDrop     = document.getElementById('file-drop');
    const fileFilled   = document.getElementById('file-filled');
    const fileNameText = document.getElementById('file-name-text');
    const removeBtn    = document.getElementById('remove-btn');
    const statusEl     = document.getElementById('status');
    const spamNote     = document.getElementById('spam-note');
    const btn          = document.getElementById('btn');

    let pollTimer = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    function showFile(name) {
      fileNameText.textContent = name;
      fileDrop.style.display   = 'none';
      fileFilled.style.display = 'flex';
    }

    function clearFile() {
      csvInput.value           = '';
      fileNameText.textContent = '';
      fileDrop.style.display   = '';
      fileFilled.style.display = 'none';
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    async function pollStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();

        if (data.status === 'done') {
          stopPolling();
          btn.disabled = false;
          btn.textContent = 'Enrich & Send';
          setStatus('Done! Enriched CSV sent to your email.', 'success');
        } else if (data.status === 'failed') {
          stopPolling();
          btn.disabled = false;
          btn.textContent = 'Enrich & Send';
          setStatus(`Error: ${data.error || 'Something went wrong during processing.'}`, 'error');
        }
        // still 'running' — keep polling
      } catch {
        // network hiccup — keep polling
      }
    }

    csvInput.addEventListener('change', function () {
      if (this.files[0]) showFile(this.files[0].name);
    });

    removeBtn.addEventListener('click', clearFile);

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      stopPolling();

      if (!csvInput.files[0]) {
        setStatus('Please select a CSV file.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Submitting...';
      setStatus('', '');

      try {
        const res  = await fetch('/api/upload', { method: 'POST', body: new FormData(e.target) });
        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || 'Upload failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Enrich & Send';
          return;
        }

        // Upload accepted — start polling for pipeline result
        e.target.reset();
        clearFile();
        setStatus('Processing your CSV, this may take a minute...', 'processing');
        btn.textContent = 'Processing...';
        pollTimer = setInterval(pollStatus, 4000);

        // Hard timeout after 5 minutes
        setTimeout(() => {
          if (pollTimer) {
            stopPolling();
            btn.disabled = false;
            btn.textContent = 'Enrich & Send';
            setStatus('Timed out waiting for a response. Check your email or try again.', 'error');
          }
        }, 5 * 60 * 1000);

      } catch {
        setStatus('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Enrich & Send';
      }
    });
  </script>
</body>
</html>
